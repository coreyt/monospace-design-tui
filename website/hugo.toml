baseURL = "https://coreyt.github.io/monospace-design-tui/"
languageCode = "en-us"
title = "Monospace Design TUI"
enableEmoji = false

[mediaTypes]
  [mediaTypes."text/markdown"]
    suffixes = ["md"]

[outputFormats]
  [outputFormats.markdown]
    mediaType = "text/markdown"
    baseName = "index"
    isPlainText = true

[outputs]
  home = ["HTML"]
  section = ["HTML", "markdown"]
  page = ["HTML", "markdown"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = true
    style = "monokai"
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[params]
  description = "Prescriptive design rules for terminal user interfaces"
  github = "https://github.com/coreyt/monospace-design-tui"
