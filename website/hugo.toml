baseURL = "https://monospace-tui.dev/"
languageCode = "en-us"
title = "Monospace Design TUI"
enableEmoji = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = true
    style = "monokai"
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[params]
  description = "Prescriptive design rules for terminal user interfaces"
  github = "https://github.com/monospace-tui/monospace-design-tui"
