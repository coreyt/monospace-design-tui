version: "0.3.0"
artifact_type: screen
id: fuzzy-topic-search
title: Topic Search
purpose: Search across topics quickly
source: { kind: generated, inputs: [example] }
status: draft
workflow_id: wf-topic-explorer
archetype: fuzzy-finder
patterns: [selection-grammar]
entry_conditions: [search opened]
regions:
  - { id: header, type: header, role: query, contents: [query-input] }
  - { id: region_b, type: region_b, role: results, contents: [topic-results] }
  - { id: region_c, type: inspector, role: preview, contents: [topic-preview] }
  - { id: footer, type: footer, role: commands, contents: [footer-keys] }
components:
  - { id: query-input, type: input, region: header, purpose: topic search }
  - { id: topic-results, type: list, region: region_b, purpose: ranked topic results }
  - { id: topic-preview, type: detail, region: region_c, purpose: selected topic preview }
actions:
  - { id: open-topic, label: Open Topic, target: topic-results, kind: selection_local }
focus: { default_target: query-input, focus_order: [query-input, topic-results] }
transitions:
  - { id: select-topic, type: jump, trigger: enter, target: file-manager-topic-browser }
footer_keys:
  - { key: "enter", label: Select, scope: finder }
  - { key: "esc", label: Cancel, scope: finder }
notes: []
