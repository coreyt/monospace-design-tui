kind: screen
id: admin-scope-refinement
title: Scope Refinement Review
purpose: Review and edit proposed dimensions before collection
regions:
  - { id: region_a, type: region_a, role: list }
  - { id: region_b, type: region_b, role: editor }
  - { id: region_c, type: inspector, role: summary }
  - { id: footer, type: footer, role: commands }
components:
  - { id: dimension-list, type: list, region: region_a, purpose: candidate dimensions }
  - { id: dimension-editor, type: form, region: region_b, purpose: edit selected dimension }
  - { id: topic-summary, type: summary, region: region_c, purpose: request interpretation }
actions:
  - { id: approve, label: Approve Scope, target: dimension-list, kind: review }
focus: { default_target: dimension-list, focus_order: [dimension-list, dimension-editor] }
transitions:
  - { id: approve-scope, type: advance, trigger: approve, target: dashboard-collection-review }
footer_keys:
  bindings:
    - { key: "a", label: Approve Scope, scope: screen }
    - { key: "d", label: Delete Dimension, scope: list }
    - { key: "Esc", label: Back, scope: screen }
