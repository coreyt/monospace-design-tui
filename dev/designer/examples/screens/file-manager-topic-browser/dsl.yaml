kind: screen
id: file-manager-topic-browser
title: Topic Browser
purpose: Browse research topics and topic groups
regions:
  - { id: region_a, type: region_a, role: topic-list }
  - { id: region_b, type: region_b, role: preview }
  - { id: footer, type: footer, role: commands }
components:
  - { id: topic-list, type: list, region: region_a, purpose: topic items }
  - { id: topic-preview, type: detail, region: region_b, purpose: selected topic preview }
actions:
  - { id: open, label: Open Topic, target: topic-list, kind: selection_local }
focus: { default_target: topic-list, focus_order: [topic-list, topic-preview] }
transitions:
  - { id: open-topic, type: push, trigger: enter, target: file-manager-source-explorer }
footer_keys:
  bindings:
    - { key: "Tab", label: Switch Pane, scope: screen }
    - { key: "Enter", label: Open Topic, scope: list }
    - { key: "/", label: Filter, scope: list }
