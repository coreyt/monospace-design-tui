version: "0.3.0"
artifact_type: screen
id: fuzzy-command-palette
title: Command Palette
purpose: Search and run commands quickly
source: { kind: generated, inputs: [example] }
status: draft
workflow_id: wf-onboarding
archetype: fuzzy-finder
patterns: [command-jump]
entry_conditions: [palette opened]
regions:
  - { id: header, type: header, role: query, contents: [query-input] }
  - { id: region_b, type: region_b, role: results, contents: [command-results] }
  - { id: footer, type: footer, role: commands, contents: [footer-keys] }
components:
  - { id: query-input, type: input, region: header, purpose: command search }
  - { id: command-results, type: list, region: region_b, purpose: ranked command results }
actions:
  - { id: run-command, label: Run Command, target: command-results, kind: selection_local }
focus: { default_target: query-input, focus_order: [query-input, command-results] }
transitions:
  - { id: select-command, type: jump, trigger: enter, target: admin-settings }
footer_keys:
  - { key: "enter", label: Select, scope: finder }
  - { key: "esc", label: Cancel, scope: finder }
notes: []
