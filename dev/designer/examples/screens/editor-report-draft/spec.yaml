version: "0.3.0"
artifact_type: screen
id: editor-report-draft
title: Report Draft
purpose: Compose report text from approved artifacts
source: { kind: generated, inputs: [example] }
status: draft
workflow_id: wf-topic-explorer
archetype: editor
patterns: [focused-surface]
entry_conditions: [approved artifact selected]
regions:
  - { id: region_b, type: region_b, role: document, contents: [report-buffer] }
  - { id: region_c, type: inspector, role: outline, contents: [outline-panel] }
  - { id: footer, type: footer, role: commands, contents: [footer-keys] }
components:
  - { id: report-buffer, type: text, region: region_b, purpose: draft content }
  - { id: outline-panel, type: detail, region: region_c, purpose: report structure }
actions:
  - { id: save, label: Save Draft, target: report-buffer, kind: workflow }
focus: { default_target: report-buffer, focus_order: [report-buffer, outline-panel] }
transitions:
  - { id: review-draft, type: push, trigger: review, target: editor-item-review }
footer_keys:
  - { key: "ctrl+s", label: Save, scope: editor }
  - { key: "ctrl+g", label: Goto, scope: editor }
  - { key: "esc", label: Leave Mode, scope: editor }
notes: []
