version: "0.3.0"
artifact_type: workflow
id: wf-alert-triage
title: Alert Triage
purpose: Monitor active alerts and respond to anomalies
source:
  kind: generated
  inputs: [ops-brief]
status: draft
entry_conditions: [dashboard active]
exit_conditions: [alert acknowledged or remediated]
stages:
  - id: dashboard
    label: Live Dashboard
    purpose: observe alert stream
    screen_ids: [scr-alert-dashboard]
  - id: detail
    label: Alert Detail
    purpose: inspect one alert
    screen_ids: [scr-alert-detail]
  - id: action
    label: Action Dialog
    purpose: acknowledge or remediate
    screen_ids: [scr-action-dialog]
transitions:
  - from: dashboard
    to: detail
    trigger: inspect
    kind: push
  - from: detail
    to: action
    trigger: act
    kind: modal
checkpoints:
  - id: checkpoint-act
    label: approve remediation
    type: approve
    stage_id: action
assumptions:
  - dashboard remains hub
linked_screens: [scr-alert-dashboard, scr-alert-detail, scr-action-dialog]
