version: "0.3.0"
artifact_type: workflow
id: wf-onboarding
title: Onboarding Wizard
purpose: Collect initial setup information for a new user
source:
  kind: generated
  inputs: [task-description]
status: draft
entry_conditions:
  - first run
exit_conditions:
  - workspace created
stages:
  - id: intro
    label: Introduction
    purpose: explain the flow
    screen_ids: [scr-intro]
  - id: profile
    label: Profile
    purpose: collect user info
    screen_ids: [scr-profile]
  - id: preferences
    label: Preferences
    purpose: choose defaults
    screen_ids: [scr-preferences]
  - id: confirm
    label: Confirmation
    purpose: review all choices
    screen_ids: [scr-confirm]
transitions:
  - from: intro
    to: profile
    trigger: next
    kind: advance
  - from: profile
    to: preferences
    trigger: next
    kind: advance
  - from: preferences
    to: confirm
    trigger: next
    kind: advance
checkpoints:
  - id: checkpoint-confirm
    label: approve onboarding choices
    type: approve
    stage_id: confirm
assumptions:
  - linear workflow
linked_screens: [scr-intro, scr-profile, scr-preferences, scr-confirm]
